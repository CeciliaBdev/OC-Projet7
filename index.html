<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Les petits plats</title>
  </head>
  <body>
    <div class="container">
      <header class="flex justify-center mb-4">
        <!-- logo -->
        <img src="./assets/icons/logo.png" alt="logo, les petits plats" />
      </header>

      <div class="flex">
        <div class="mb-3 w-full">
          <div
            class="input-group relative flex items-stretch w-full mb-4 rounded"
          >
            <input
              type="search"
              class="
                form-control
                relative
                flex-auto
                min-w-0
                block
                w-full
                px-3
                py-3
                font-normal
                bg-clip-padding
                border border-solid border-gray-300
                rounded
                transition
                ease-in-out
                m-0
                focus:text-gray-700
                focus:bg-white
                focus:border-blue-600
                focus:outline-none
              "
              placeholder="Search"
              aria-label="Search"
              aria-describedby="button-addon2"
            />
            <span
              class="
                input-group-text
                flex
                px-3
                py-1.5
                text-base
                font-normal
                text-gray-700 text-center
                whitespace-nowrap
                rounded
              "
              id="basic-addon2"
            >
              <svg
                aria-hidden="true"
                focusable="false"
                data-prefix="fas"
                data-icon="search"
                class="w-4"
                role="img"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 512 512"
              >
                <path
                  fill="currentColor"
                  d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.2-128-128 0-70.7 57.2-128 128-128 70.7 0 128 57.2 128 128 0 70.7-57.2 128-128 128z"
                ></path>
              </svg>
            </span>
          </div>
        </div>
      </div>

      <div class="buttons mt-8 mb-8 flex">
        <div>
          <button
            type="button"
            class="bg-blue-500 text-white font-bold py-4 px-8 rounded mr-4"
            id="btnMenuIngredients"
          >
            Ingredients
          </button>
          <div
            class="
              dropdownIngredients
              bg-blue-500
              grid grid-cols-3
              text-sm text-white
              rounded
            "
          >
            <ul class="hidden"></ul>
          </div>
        </div>

        <div>
          <button
            type="button"
            class="bg-green-500 text-white font-bold py-4 px-8 rounded mr-4"
            id="btnMenuAppareil"
          >
            Appareils
          </button>
          <div
            class="dropdownAppareils bg-green-500 text-sm text-white rounded"
          >
            <ul class="hidden"></ul>
          </div>
        </div>
        <div>
          <button
            type="button"
            class="bg-red-500 text-white font-bold py-4 px-8 rounded"
            id="btnMenuUstensils"
          >
            Ustensiles
          </button>
          <div
            class="
              dropdownUstensils
              bg-red-500
              text-sm text-white
              grid grid-cols-2
              rounded
            "
          >
            <ul class="hidden"></ul>
          </div>
        </div>
      </div>
      <div class="container_card_recipes">
        <div class="grid-cols-3">
          <div class="" id="card_container"></div>
        </div>
      </div>
    </div>

    <script src="./js/index.js" type="module"></script>
  </body>
</html>
