<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.0/font/bootstrap-icons.css"
    />
    <title>Les petits plats</title>
  </head>
  <body>
    <header class="d-flex justify-content-center m-5">
      <!-- logo -->
      <img src="./assets/icons/logo.png" alt="logo, les petits plats" />
    </header>

    <!--  container principal -->
    <div class="container">
      <div class="input-group mb-3">
        <input
          type="text"
          class="form-control form-control-lg"
          placeholder="Rechercher une recette"
          aria-label="Recherche"
        />
        <span class="input-group-text" id="basic-addon1"
          ><i class="bi bi-search"></i
        ></span>
      </div>
      <button type="button" class="btn btn-primary btn-lg dropdown-toggle">
        Ingredients
      </button>
      <button type="button" class="btn btn-success btn-lg dropdown-toggle">
        Appareils
      </button>
      <button type="button" class="btn btn-danger btn-lg dropdown-toggle">
        Ustensiles
      </button>

      <div class="container_card_recipes">
        <div class="row d-flex">
          <div class="col-12" 
              id="card_container">
          </div>
      </div>
   

    <script src="./js/index.js" type="module"></script>
    <script src="./js/RecipesCard.js" type="module"></script>
    <script src="./js/search.js" type="module"></script>
  </body>
</html>
